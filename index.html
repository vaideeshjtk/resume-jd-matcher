// ─── OpenAI Model ─────────────────────────────────────────────────────────────
const MODEL = "gpt-4o-mini"; // cheap + fast; change to "gpt-4o" for higher quality

// ─── Library Loaders ──────────────────────────────────────────────────────────
let pdfReady = false, zipReady = false;
function loadScript(src) {
  return new Promise((res, rej) => {
    if (document.querySelector(`script[src="${src}"]`)) { res(); return; }
    const s = document.createElement("script");
    s.src = src; s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}
async function ensurePDF() {
  if (pdfReady) return;
  await loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
  window.pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  pdfReady = true;
}
async function ensureZip() {
  if (zipReady) return;
  await loadScript("https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js");
  zipReady = true;
}

// ─── Text Extraction ──────────────────────────────────────────────────────────
async function extractText(file) {
  const ext = file.name.split(".").pop().toLowerCase();
  if (ext === "txt") {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = e => res(e.target.result);
      r.onerror = rej;
      r.readAsText(file);
    });
  }
  if (ext === "pdf") {
    await ensurePDF();
    const buf = await file.arrayBuffer();
    const pdf = await window.pdfjsLib.getDocument({ data: buf }).promise;
    let txt = "";
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const c = await page.getTextContent();
      txt += c.items.map(it => it.str).join(" ") + "\n";
    }
    return txt;
  }
  if (ext === "docx" || ext === "doc") {
    const buf = await file.arrayBuffer();
    const result = await mammoth.extractRawText({ arrayBuffer: buf });
    return result.value;
  }
  if (ext === "pptx") {
    await ensureZip();
    const buf = await file.arrayBuffer();
    const zip = await JSZip.loadAsync(buf);
    let txt = "";
    const slides = Object.keys(zip.files)
      .filter(n => /^ppt\/slides\/slide\d+\.xml$/.test(n))
      .sort((a, b) => parseInt(a.match(/\d+/)[0]) - parseInt(b.match(/\d+/)[0]));
    for (const s of slides) {
      const xml = await zip.files[s].async("string");
      const ms = xml.match(/<a:t[^>]*>([^<]*)<\/a:t>/g) || [];
      txt += ms.map(m => m.replace(/<[^>]+>/g, "")).join(" ") + "\n";
    }
    return txt || "PPTX text extraction limited — consider PDF export";
  }
  throw new Error(`Unsupported file type: .${ext}`);
}

// ─── OpenAI API ───────────────────────────────────────────────────────────────
async function callOpenAI(apiKey, prompt, maxTokens = 1000) {
  const res = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${apiKey}`,
    },
    body: JSON.stringify({
      model: MODEL,
      max_tokens: maxTokens,
      response_format: { type: "json_object" }, // forces JSON output
      messages: [
        { role: "system", content: "You are a helpful assistant that always responds with valid JSON only. No markdown, no explanation, just raw JSON." },
        { role: "user", content: prompt }
      ],
    }),
  });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(`OpenAI ${res.status}: ${e?.error?.message || res.statusText}`);
  }
  const data = await res.json();
  const txt = data.choices?.[0]?.message?.content || "";
  try { return JSON.parse(txt); }
  catch {
    const m = txt.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
    if (m) return JSON.parse(m[0]);
    throw new Error("Could not parse JSON: " + txt.substring(0, 200));
  }
}

async function analyzeResume(apiKey, text) {
  return callOpenAI(apiKey,
    `Analyze this resume and return a JSON object.\n\nResume:\n${text.substring(0, 5000)}\n\n` +
    `Return exactly: {"name":"full name","title":"job title","experience_years":0,"skills":["skill1"],"education":"degree and field","certifications":["cert1"],"industries":["industry1"],"summary":"2-3 sentence professional summary"}`,
    1000);
}

async function analyzeJD(apiKey, text) {
  return callOpenAI(apiKey,
    `Analyze this job description and return a JSON object.\n\nJD:\n${text.substring(0, 5000)}\n\n` +
    `Return exactly: {"title":"job title","required_skills":["skill1"],"preferred_skills":["skill1"],"experience_required":0,"education_required":"degree","certifications_preferred":["cert1"],"industry":"industry name","summary":"2-3 sentence role summary"}`,
    800);
}

async function matchResumeToAllJDs(apiKey, resumeAnalysis, jdAnalyses) {
  // OpenAI json_object mode requires a single top-level object, so we wrap the array
  const result = await callOpenAI(apiKey,
    `You are a senior recruiter. Evaluate this candidate against ${jdAnalyses.length} job description(s).\n\n` +
    `CANDIDATE: ${JSON.stringify(resumeAnalysis)}\n\nJOB DESCRIPTIONS: ${JSON.stringify(jdAnalyses.map((j,i)=>({index:i,...j})))}\n\n` +
    `Return a JSON object with a single key "matches" containing an array of ${jdAnalyses.length} objects (one per JD in order):\n` +
    `{"matches":[{"jd_index":0,"overall_score":85,"skills_score":80,"experience_score":90,"education_score":85,` +
    `"verdict":"Strong Match","matching_skills":["skill1"],"missing_required_skills":["skill2"],"missing_preferred_skills":["skill3"],` +
    `"strengths":["strength 1","strength 2","strength 3"],` +
    `"gap_analysis":[{"gap":"description","importance":"Critical"}],` +
    `"course_suggestions":[{"skill":"skill name","course":"exact course title","platform":"Coursera","duration":"20 hours","priority":"High"}],` +
    `"recommendation":"2-3 sentence personalized recommendation"}]}`,
    3000);
  // Unwrap the array from the wrapper object
  return result?.matches || result;
}

// ─── API Key Screen ───────────────────────────────────────────────────────────
function ApiKeyScreen({ onSubmit }) {
  const [key, setKey] = useState("");
  const [show, setShow] = useState(false);
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);

  const handleSubmit = async () => {
    const k = key.trim();
    if (!k.startsWith("sk-")) { setErr("OpenAI keys start with sk-"); return; }
    setLoading(true); setErr("");
    try {
      // Quick validation ping with cheapest model
      const res = await fetch("https://api.openai.com/v1/chat/completions", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${k}` },
        body: JSON.stringify({ model: "gpt-4o-mini", max_tokens: 5, messages: [{ role: "user", content: "hi" }] }),
      });
      if (res.status === 401) { setErr("Invalid API key — check and try again."); setLoading(false); return; }
      if (res.status === 429) { setErr("Rate limit or quota exceeded on your OpenAI account."); setLoading(false); return; }
      onSubmit(k);
    } catch(e) { setErr("Network error: " + e.message); setLoading(false); }
  };

  return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>
      <div style={{ maxWidth:460, width:"100%" }}>
        <div style={{ textAlign:"center", marginBottom:40 }}>
          <div style={{ display:"inline-flex", alignItems:"center", gap:7, background:"rgba(0,201,167,.1)", border:"1px solid rgba(0,201,167,.25)", borderRadius:100, padding:"5px 16px", marginBottom:20 }}>
            <span style={{color:"#00C9A7"}}><Icon.Zap /></span>
            <span style={{ fontSize:11, color:"#00C9A7", letterSpacing:".12em", fontFamily:"'DM Mono'" }}>AI TALENT INTELLIGENCE PLATFORM</span>
          </div>
          <h1 style={{ fontSize:42, fontWeight:800, letterSpacing:"-.03em", lineHeight:1.05, marginBottom:12 }}>
            Resume<span style={{color:"#00C9A7"}}>Match</span> AI
          </h1>
          <p style={{ fontSize:14, color:"#7B90BB", lineHeight:1.75 }}>
            Upload CVs and job descriptions — AI scores every match,<br/>maps skill gaps, and builds personalized training roadmaps.
          </p>
        </div>

        <div style={{ background:"#0C1425", border:"1px solid #1A2D50", borderRadius:16, padding:"28px 28px 24px" }}>
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:6 }}>
            <span style={{color:"#E2E8F4"}}><Icon.OpenAI /></span>
            <span style={{ fontWeight:700, fontSize:15 }}>Enter your OpenAI API key</span>
          </div>
          <div style={{ display:"inline-flex", alignItems:"center", gap:6, background:"rgba(16,185,129,.08)", border:"1px solid rgba(16,185,129,.2)", borderRadius:6, padding:"3px 10px", marginBottom:16 }}>
            <span style={{ fontSize:10, fontFamily:"'DM Mono'", color:"#10B981" }}>Powered by {MODEL}</span>
          </div>
          <p style={{ fontSize:12, color:"#7B90BB", lineHeight:1.75, marginBottom:16 }}>
            Your key runs entirely in your browser —&nbsp;
            <strong style={{color:"#E2E8F4"}}>never stored or sent anywhere</strong>.
            Get one at{" "}
            <a href="https://platform.openai.com/api-keys" target="_blank" rel="noreferrer" style={{color:"#00C9A7"}}>platform.openai.com/api-keys</a>.
          </p>
          <div style={{ position:"relative", marginBottom: err ? 10 : 18 }}>
            <input
              type={show ? "text" : "password"}
              value={key}
              onChange={e => { setKey(e.target.value); setErr(""); }}
              onKeyDown={e => e.key === "Enter" && handleSubmit()}
              placeholder="sk-..."
              style={{ width:"100%", background:"#060C1A", border:"1px solid #1A2D50", borderRadius:10, padding:"12px 40px 12px 14px", fontSize:13, color:"#E2E8F4", fontFamily:"'DM Mono'", outline:"none" }}
            />
            <button onClick={() => setShow(v => !v)} style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", cursor:"pointer", color:"#3D5280", display:"flex" }}>
              <Icon.Eye show={show} />
            </button>
          </div>
          {err && <div style={{ fontSize:12, color:"#EF4444", marginBottom:14 }}>{err}</div>}
          <button className="btn-go" onClick={handleSubmit} disabled={!key.trim() || loading}
            style={{ width:"100%", background: key.trim()&&!loading ? "linear-gradient(135deg,#00C9A7,#0088FF)" : "#1A2D50", color: key.trim()&&!loading ? "#050B18" : "#3D5280", border:"none", borderRadius:10, padding:"13px", fontSize:14, fontWeight:700, fontFamily:"'Syne'", cursor: key.trim()&&!loading ? "pointer" : "not-allowed", display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
            {loading ? "Verifying…" : <><Icon.Arrow /> Start matching</>}
          </button>
        </div>
        <p style={{ textAlign:"center", fontSize:11, color:"#3D5280", marginTop:14 }}>
          Supports PDF · DOCX · PPTX · TXT &nbsp;·&nbsp; Uses {MODEL} (~$0.01–0.05 per analysis)
        </p>
      </div>
    </div>
  );
}

        ].map(({ label, color, rgb, files, setter, ref, accept, hint, icon }) => (

              <div style={{ fontWeight:700, fontSize:15, marginBottom:6 }}>{label}</div>
              <div style={{ fontSize:12, color:"#7B90BB" }}>Drag & drop or <span style={{color}}>browse</span></div>
              <div style={{ fontSize:10, color:"#3D5280", marginTop:8, fontFamily:"'DM Mono'" }}>{hint}</div>
              <input ref={ref} type="file" multiple accept={accept} style={{display:"none"}} onChange={e => setter(prev => [...prev, ...Array.from(e.target.files)])} />
            </div>
            {files.length > 0 && (
              <div style={{ marginTop:10, background:"#0C1425", border:"1px solid #1A2D50", borderRadius:10, overflow:"hidden" }}>
                {files.map((f, i) => (
                  <div key={i} className="frow" style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 12px", borderBottom: i<files.length-1?"1px solid #1A2D50":"none" }}>
                    <Icon.File size={11} color={color} />
                    <span style={{ flex:1, fontSize:11, color:"#B0BFDA", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{f.name}</span>
                    <span style={{ fontSize:10, color:"#3D5280", fontFamily:"'DM Mono'" }}>{(f.size/1024).toFixed(0)}KB</span>
                    <button onClick={e => { e.stopPropagation(); setter(prev => prev.filter((_,j)=>j!==i)); }}
                      style={{ background:"none", border:"none", cursor:"pointer", color:"#3D5280", display:"flex", padding:2 }}><Icon.X size={11}/></button>
                  </div>
                ))}
              </div>
            )}
          </div>
        ))}
      </div>

      <div style={{ textAlign:"center" }}>
        <button className="btn-go" disabled={!canStart} onClick={canStart ? onStart : undefined}
          style={{ background: canStart?"linear-gradient(135deg,#00C9A7,#0088FF)":"#1A2D50", color: canStart?"#050B18":"#3D5280", border:"none", borderRadius:12, padding:"15px 48px", fontSize:14, fontWeight:700, fontFamily:"'Syne'", cursor: canStart?"pointer":"not-allowed", display:"inline-flex", alignItems:"center", gap:10 }}>
          <span style={{color: canStart?"#050B18":"#3D5280"}}><Icon.Zap /></span>
          {canStart ? `Analyze ${rFiles.length} resume${rFiles.length>1?"s":""} × ${jFiles.length} JD${jFiles.length>1?"s":""}` : "Upload files to continue"}
          {canStart && <Icon.Arrow />}
        </button>
        <div style={{marginTop:12}}>
          <button onClick={onBack} style={{ background:"none", border:"none", color:"#3D5280", fontSize:12, cursor:"pointer", fontFamily:"'Syne'" }}>← Change API key</button>
        </div>
      </div>
    </div>
  );
}

// ─── Processing Step ──────────────────────────────────────────────────────────
function ProcessingStep({ log, progress, status }) {
  const ref = useRef();
  useEffect(() => { if (ref.current) ref.current.scrollTop = ref.current.scrollHeight; }, [log]);
  const C = 2 * Math.PI * 34;
  return (
    <div style={{ maxWidth:640, margin:"0 auto", padding:"60px 24px" }}>
      <div style={{ textAlign:"center", marginBottom:40 }}>
        <div style={{ position:"relative", width:88, height:88, margin:"0 auto 20px" }}>
          <svg width="88" height="88" viewBox="0 0 88 88">
            <circle cx="44" cy="44" r="34" fill="none" stroke="#1A2D50" strokeWidth="6"/>
            <circle cx="44" cy="44" r="34" fill="none" stroke="#00C9A7" strokeWidth="6" strokeLinecap="round"
              strokeDasharray={`${C*progress/100} ${C*(1-progress/100)}`} strokeDashoffset={C*0.25}
              style={{transition:"stroke-dasharray .4s ease"}}/>
          </svg>
          <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center" }}>
            <span style={{ fontFamily:"'DM Mono'", fontSize:15, fontWeight:500, color:"#00C9A7" }}>{progress}%</span>
          </div>
        </div>
        <h2 style={{ fontSize:24, fontWeight:700, marginBottom:8 }}>Processing files…</h2>
        <p style={{ fontSize:13, color:"#7B90BB" }}>{status || "Initializing…"}</p>
      </div>
      <div ref={ref} style={{ background:"#0C1425", border:"1px solid #1A2D50", borderRadius:12, padding:"14px 16px", height:320, overflowY:"auto" }}>
        {log.length===0 && <span style={{color:"#3D5280",fontSize:12}}>Waiting…</span>}
        {log.map((e,i) => (
          <div key={i} style={{ display:"flex", gap:12, marginBottom:5, fontSize:12, lineHeight:1.55 }}>
            <span style={{ color:"#3D5280", fontFamily:"'DM Mono'", fontSize:10, flexShrink:0, marginTop:1 }}>{e.t}</span>
            <span style={{ color: e.type==="err"?"#EF4444":e.type==="ok"?"#22C55E":e.type==="section"?"#00C9A7":"#B0BFDA", fontWeight: e.type==="section"?600:400 }}>{e.msg}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Dashboard ────────────────────────────────────────────────────────────────

// ─── Root App ─────────────────────────────────────────────────────────────────
function App() {
  const [apiKey, setApiKey] = useState("");
  const [step, setStep] = useState("apikey");
  const [resumeFiles, setResumeFiles] = useState([]);
  const [jdFiles, setJDFiles] = useState([]);
  const [result, setResult] = useState({ resumes:[], jds:[], matches:{} });
  const [log, setLog] = useState([]);
  const [progress, setProgress] = useState(0);
  const [statusMsg, setStatusMsg] = useState("");
  const [selected, setSelected] = useState(null);

  const addLog = (msg, type="info") =>
    setLog(prev => [...prev, { msg, type, t: new Date().toLocaleTimeString("en",{hour12:false}) }]);

  const startProcessing = async () => {
    setStep("processing"); setLog([]); setProgress(0);
    const total = resumeFiles.length + jdFiles.length + resumeFiles.length;
    let done = 0;
    const tick = msg => { done++; setProgress(Math.round((done/total)*100)); setStatusMsg(msg); };
    try {
      addLog("Extracting text from uploaded files…","section");
      const rData=[], jData=[];
      for (const f of resumeFiles) {
        addLog(`Reading ${f.name}`);
        try { const text=await extractText(f); rData.push({file:f,text}); addLog(`  ✓ ${f.name} (${text.length.toLocaleString()} chars)`,"ok"); }
        catch(e) { addLog(`  ✗ ${f.name}: ${e.message}`,"err"); rData.push({file:f,text:""}); }
      }
      for (const f of jdFiles) {
        addLog(`Reading ${f.name}`);
        try { const text=await extractText(f); jData.push({file:f,text}); addLog(`  ✓ ${f.name}`,"ok"); }
        catch(e) { addLog(`  ✗ ${f.name}: ${e.message}`,"err"); jData.push({file:f,text:""}); }
      }
      addLog("AI analyzing candidate profiles…","section");
      const aResumes=[];
      for (const r of rData) {
        addLog(`Analyzing ${r.file.name}`);
        try {
          const analysis=await analyzeResume(apiKey,r.text);
          aResumes.push({...r,analysis});
          addLog(`  ✓ ${analysis.name} · ${analysis.title}`,"ok");
          tick(`Analyzed: ${analysis.name}`);
        } catch(e) {
          addLog(`  ✗ ${e.message}`,"err");
          aResumes.push({...r,analysis:{name:r.file.name.replace(/\.[^.]+$/,""),title:"Unknown",experience_years:0,skills:[],education:"",certifications:[],industries:[],summary:""}});
          tick(`Skipped: ${r.file.name}`);
        }
        await sleep(300);
      }
      addLog("AI analyzing job descriptions…","section");
      const aJDs=[];
      for (const j of jData) {
        addLog(`Analyzing ${j.file.name}`);
        try {
          const analysis=await analyzeJD(apiKey,j.text);
          aJDs.push({...j,analysis});
          addLog(`  ✓ ${analysis.title} · ${analysis.industry}`,"ok");
          tick(`Analyzed JD: ${analysis.title}`);
        } catch(e) {
          addLog(`  ✗ ${e.message}`,"err");
          aJDs.push({...j,analysis:{title:j.file.name.replace(/\.[^.]+$/,""),required_skills:[],preferred_skills:[],experience_required:0,education_required:"",certifications_preferred:[],industry:"",summary:""}});
          tick(`Skipped: ${j.file.name}`);
        }
        await sleep(300);
      }
      addLog("AI matching candidates → job descriptions…","section");
      const allMatches={};
      const jdAnalyses=aJDs.map(j=>j.analysis);
      for (let i=0;i<aResumes.length;i++) {
        const r=aResumes[i];
        addLog(`Matching ${r.analysis.name}`);
        try {
          const res=await matchResumeToAllJDs(apiKey,r.analysis,jdAnalyses);
          allMatches[i]=Array.isArray(res)?res:[];
          const best=allMatches[i].reduce((a,b)=>a.overall_score>b.overall_score?a:b,{overall_score:0});
          addLog(`  ✓ Best: ${best.overall_score}% — ${best.verdict}`,"ok");
          tick(`Matched: ${r.analysis.name}`);
        } catch(e) {
          addLog(`  ✗ ${e.message}`,"err");
          allMatches[i]=jdAnalyses.map((_,ji)=>({jd_index:ji,overall_score:0,skills_score:0,experience_score:0,education_score:0,verdict:"Needs Development",matching_skills:[],missing_required_skills:[],missing_preferred_skills:[],strengths:[],gap_analysis:[],course_suggestions:[],recommendation:"Analysis failed."}));
          tick(`Skipped: ${r.analysis.name}`);
        }
        await sleep(300);
      }
      setResult({resumes:aResumes,jds:aJDs,matches:allMatches});
      addLog("All done! Building dashboard…","ok");
      await sleep(700);
      setStep("dashboard");
    } catch(e) { addLog(`Fatal error: ${e.message}`,"err"); }
  };

  const exportCSV = () => {
    const { resumes, jds, matches } = result;
    const hdr=["Candidate","Resume File","JD Title","JD File","Overall Score","Skills Score","Experience Score","Education Score","Verdict","Matching Skills","Missing Required","Missing Preferred","Top Courses","Recommendation"];
    const rows=[hdr];
    resumes.forEach((r,ri) => {
      (matches[ri]||[]).forEach(m => {
        const jd=jds[m.jd_index];
        rows.push([r.analysis.name,r.file.name,jd?.analysis?.title||"",jd?.file?.name||"",m.overall_score,m.skills_score,m.experience_score,m.education_score,m.verdict,(m.matching_skills||[]).join("; "),(m.missing_required_skills||[]).join("; "),(m.missing_preferred_skills||[]).join("; "),(m.course_suggestions||[]).slice(0,3).map(c=>`${c.course} (${c.platform})`).join("; "),m.recommendation||""]);
      });
    });
    const csv=rows.map(r=>r.map(c=>`"${String(c??"").replace(/"/g,'""')}"`).join(",")).join("\n");
    const url=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
    const a=document.createElement("a");
    a.href=url; a.download=`talent-match-${new Date().toISOString().slice(0,10)}.csv`;
    a.click(); URL.revokeObjectURL(url);
  };

  if (step==="apikey") return <ApiKeyScreen onSubmit={k => { setApiKey(k); setStep("upload"); }} />;
  if (step==="upload") return <UploadStep rFiles={resumeFiles} setRFiles={setResumeFiles} jFiles={jdFiles} setJFiles={setJDFiles} onStart={startProcessing} onBack={() => setStep("apikey")} />;
  if (step==="processing") return <ProcessingStep log={log} progress={progress} status={statusMsg} />;
  if (step==="dashboard") return <Dashboard result={result} selected={selected} setSelected={setSelected} onExport={exportCSV} onReset={() => { setStep("upload"); setResumeFiles([]); setJDFiles([]); setResult({resumes:[],jds:[],matches:{}}); }} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
